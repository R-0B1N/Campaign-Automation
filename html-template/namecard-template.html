<!DOCTYPE html>
<html dir="{{text_direction}}">
<head>
    <meta charset="UTF-8">
    <title>Yubit Namecard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            width: 100vw; 
            height: 100vh; 
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            position: relative;
            background-color: #000;
            overflow: hidden;
        }

        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- LAYOUT 1: WITH LOGO --- */
        .kol-container-logo {
            position: absolute;
            left: 2052px;  /* 1026px * 2 */
            top: 688px;    /* 344px * 2 */
            width: 738px;  /* 369px * 2 */
            height: 786px; /* 393px * 2 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 34px;     /* 17px * 2 */
            z-index: 2;
        }

        .kol-logo {
            width: 372px;  /* 186px * 2 */
            height: 372px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #000;
        }

        .kol-name-logo {
            font-size: 100px; /* 50px * 2 */
            font-weight: 600;
            color: #CCCCCA;
            text-align: center;
            text-transform: capitalize;
            white-space: nowrap; 
            filter: drop-shadow(0px 11.76px 17.65px rgba(16, 3, 0, 0.7));
        }

        /* --- LAYOUT 2: WITHOUT LOGO --- */
        .kol-container-nologo {
            position: absolute;
            left: 2044px;  /* 1022px * 2 */
            top: 696px;    /* 348px * 2 */
            width: 738px;  /* 369px * 2 */
            height: 754px; /* 377px * 2 */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .kol-name-nologo {
            font-size: 80px; /* 40px * 2 */
            font-weight: 600;
            text-align: center;
            text-transform: capitalize;
            white-space: nowrap; 
            background: linear-gradient(90deg, #CCCCCA 0%, #666665 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            /* Using drop-shadow instead of text-shadow prevents overlapping issues with background-clip in webkit */
            filter: drop-shadow(0px 11.76px 17.65px rgba(16, 3, 0, 0.7));
        }
    </style>
</head>
<body>
    <img src="{{{bg_image_data_uri}}}" class="background-layer" alt="Background">

    {{#if has_logo}}
    <div class="kol-container-logo">
        <img src="{{kol_logo_url}}" class="kol-logo" alt="KOL">
        <div class="kol-name-logo">{{kol_name}}</div>
    </div>
    {{else}}
    <div class="kol-container-nologo">
        <div class="kol-name-nologo">{{kol_name}}</div>
    </div>
    {{/if}}

    <script>
        document.fonts.ready.then(() => {
            const isLogo = {{has_logo}};
            const container = document.querySelector(isLogo ? '.kol-container-logo' : '.kol-container-nologo');
            const kolName = document.querySelector(isLogo ? '.kol-name-logo' : '.kol-name-nologo');
            
            if (kolName && container) {
                let currentFontSize = isLogo ? 100 : 100; 
                
                // NEW LOGIC: Calculate a safe maximum width.
                // Since the text sits near the bottom curve of the circle, we restrict its max width to 540px.
                // If there is no logo, the text is dead-center, so it can use the full container width safely.
                const safeWidth = isLogo ? 540 : container.clientWidth - 10;
                
                // Dynamically shrink text if the name is wider than our safe boundary
                while (kolName.scrollWidth > safeWidth && currentFontSize > 30) {
                    currentFontSize -= 2;
                    kolName.style.fontSize = currentFontSize + 'px';
                }
            }
        });
    </script>
</body>
</html>
