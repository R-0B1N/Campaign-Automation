<!DOCTYPE html>
<html dir="{{text_direction}}">
<head>
    <meta charset="UTF-8">
    <title>Yubit Namecard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            width: 100vw; 
            height: 100vh; 
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', 'Noto Sans SC', sans-serif;
            position: relative;
            background-color: #0B0B0B;
            overflow: hidden;
        }

        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 👈 FIXED: Adapted for <img> tag */
            z-index: 1;
        }

        .ring-safe-zone {
            position: absolute;
            left: 3288px;  
            top: 1715px;   
            transform: translate(-50%, -50%); 
            width: 768px;  
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 72px; 
            z-index: 2;
        }

        .kol-logo {
            width: 528px;  
            height: 528px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #000;
            flex-shrink: 0; 
        }

        .kol-name {
            font-size: 168px; 
            font-weight: 700;
            color: #CCCCCA;
            text-align: center;
            letter-spacing: 5px; 
            white-space: nowrap; 
        }
    </style>
</head>
<body>
    <img src="{{{bg_image_data_uri}}}" class="background-layer" alt="Background">

    <div class="ring-safe-zone">
        {{#if has_logo}}
            <img src="{{kol_logo_url}}" class="kol-logo" alt="KOL">
        {{/if}}
        
        <div class="kol-name">{{kol_name}}</div>
    </div>

    <script>
        document.fonts.ready.then(() => {
            const container = document.querySelector('.ring-safe-zone');
            const kolName = document.querySelector('.kol-name');
            
            if (kolName && container) {
                let currentFontSize = 168; 
                
                while (kolName.scrollWidth > container.clientWidth && currentFontSize > 24) {
                    currentFontSize -= 5;
                    kolName.style.fontSize = currentFontSize + 'px';
                }
            }
        });
    </script>
</body>
</html>
