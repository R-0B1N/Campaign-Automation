<!DOCTYPE html>
<html>
<head>
    <title>WEEX Partner Banner Template</title>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Include Poppins weights 300 (slogan), 500 (badge/name), 800 (no-logo name) --><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;800&display=swap" rel="stylesheet">
    <!-- Include HarmonyOS Sans SC if needed for specific languages --><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300&display=swap" rel="stylesheet"> <!-- Example for Chinese --><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet"> <!-- Example for Japanese --><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300&display=swap" rel="stylesheet"> <!-- Example for Korean --><!-- Add other Noto Sans fonts as needed --><style>
        body {
            width: 1920px; /* Target render size (1600 * 1.2) */
            height: 1080px; /* Target render size (900 * 1.2) */
            margin: 0;
            font-family: 'Poppins', 'HarmonyOS Sans SC', 'Noto Sans SC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
            position: relative;
            overflow: hidden; /* Important: Prevents content spilling out */
            background-color: #000; /* Fallback */
        }

        .background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* --- THIS IS THE FIX --- */
            /* Use triple-stash to correctly load the Base64 Data URI */
            background-image: url('{{{bg_image_data_uri}}}');
            background-size: cover; /* Cover the whole area */
            background-repeat: no-repeat;
            background-position: center center;
            z-index: 1; /* Ensure background is behind everything */
        }


        /* --- Badge Styling --- */
        .badge-container {
             position: absolute; width: 716.4px; height: 117.6px; left: 601.2px; top: 847.2px;
             z-index: 5;
        }
        .badge-background {
            position: absolute; width: 716.4px; height: 88.8px; left: 0; top: 14.4px;
            background: linear-gradient(352.27deg, rgba(14, 14, 14, 0.57) -20.71%, rgba(30, 30, 30, 0.3) 64.43%);
            box-shadow: inset -4.56px -7.98px 4.56px rgba(88, 88, 88, 0.25), inset 2.28px 2.28px 4.56px rgba(255, 255, 255, 0.68);
            border-radius: 63.85px; box-sizing: border-box;
            transform: matrix(-1, 0, 0, 1, 0, 0);
        }
        .badge-text {
             position: absolute; width: 100%; left: 0; top: 31.2px; /* Adjusted visually */
             font-weight: 500; font-size: 43.2px; line-height: 64.8px;
             text-align: center; color: #FFFFFF;
             direction: {{text_direction}}; white-space: nowrap;
             padding: 0 50px; box-sizing: border-box;
         }
         /* Sparkles (Simplified) */
         .badge-sparkle-left,
         .badge-sparkle-right {
             position: absolute; width: 117.6px; height: 116.4px; top: 0;
             background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%);
             border-radius: 50%; mix-blend-mode: luminosity;
             transform: rotate(90deg);
         }
         .badge-sparkle-left { left: 0px; }
         .badge-sparkle-right { right: 0px; }

        /* --- DYNAMIC ELEMENTS --- */

        .partner-logo-container { /* Only shown if kol_logo_url is present */
            position: absolute; width: 250px; height: 250px; left: 1316px; top: 385px; z-index: 3;
        }
        .partner-disc {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1;
            background: linear-gradient(204.94deg, #FFC801 12.96%, #FFFFFF 28.62%, #FFC801 83.23%);
            border-radius: 50%;
        }
        .partner-logo { /* The actual KOL image */
            position: absolute; width: 238px; height: 238px; top: 50%; left: 50%;
            transform: translate(-50%, -50%); border-radius: 50%;
            object-fit: cover; background-color: #222; z-index: 2;
        }

        .partner-name { /* Small name below logo, only shown if kol_logo_url is present */
            position: absolute; width: 400px; left: 1441px; transform: translateX(-50%);
            top: 642px; font-style: normal; font-weight: 500; font-size: 34px;
            line-height: 1.2; text-align: center;
            background: linear-gradient(96.63deg, #FFC800 24.54%, #FFFFFF 91.76%);
            -webkit-background-clip: text; background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
             z-index: 3;
        }

         /* --- Style for Partner Name when NO LOGO (Figma Alignment Fix 4) --- */
        .partner-name-no-logo { /* Only shown if kol_logo_url is NOT present */
            position: absolute;
            /* Scaled Figma Values */
            
            left: 1450px; /* calc(1248px + 512.4px / 2) - This is the original center point */
            transform: translateX(-50%);
            
            
            top: 484px; /* 44.78% * 1080px */
            height: 112px; /* Approx (1 - 44.78% - 44.89%) * 1080px */

            font-family: 'Poppins';
            font-style: normal;
            font-weight: 800;
            font-size: 75px; 
            line-height: 112px; 
            text-align: center;
            white-space: nowrap;
            
            z-index: 3;
            /* Use flex to align text vertically within the box */
            display: flex;
            align-items: center;
            /* justify-content: center; */ /* No longer needed, transform handles H-centering */
            /* --- End of existing styles --- */


            /* === MODIFICATIONS START === */
            /* This creates a BLACK FILL and a GRADIENT OUTLINE */

            /* 1. Add the gradient as the background */
            background: linear-gradient(96.63deg, #FFC800 24.54%, #FFFFFF 91.76%);
            
            /* 2. Clip the background to the text (so it's "behind" the text) */
            -webkit-background-clip: text;
            background-clip: text;

            /* 3. Make the text FILL color black */
            color: black; 
            /* (This replaces -webkit-text-fill-color: transparent;) */
            
            /* 4. Use a TRANSPARENT text-stroke.
            This "cuts out" the outline from the black fill, 
            revealing the gradient background underneath. */
            -webkit-text-stroke: 5px transparent; /* Adjust 2px or 3px */
            text-stroke: 10px transparent; /* Fallback */

            /* 5. Remove the text-shadow as it's not needed for this effect */
            text-shadow: none;

            /* === MODIFICATIONS END === */
        }
        /* --- End Styling for NO Logo --- */


        /* --- Slogan (Figma Alignment Fix 4) --- */
        .slogan {
            position: absolute;
            /* Scaled Figma Values */
            width: 1161.6px; 
            left: calc(50% - 580px); 
            top: 979px; 
            height: 30px; /* Scaled line-height + buffer */

            font-family: 'HarmonyOS Sans SC', 'Poppins', sans-serif;
            font-style: normal;
            font-weight: 300;
            font-size: 24px; /* 20px * 1.2 */
            line-height: 27.6px; /* 23px * 1.2 */
            text-align: center;
            letter-spacing: 0.69em; /* Figma value */
            color: #E0E0E0;
            direction: {{text_direction}};
            z-index: 5;
            /* Removed flexbox */
        }
        /* --- End Slogan Styling --- */

    </style>
</head>
<body>
    <!-- 1. Background --><div class="background-layer"></div>

    <!-- 2. Badge Elements --><div class="badge-container">
        <div class="badge-background"></div>
        <div class="badge-sparkle-left"></div>
        <div class="badge-sparkle-right"></div>
        <div class="badge-text">{{official_partner_text}}</div>
    </div>

    <!-- 3. DYNAMIC Partner Content -->{{#if kol_logo_url}}
        <!-- Layout WITH Logo --><div class="partner-logo-container">
            <div class="partner-disc"></div>
            <img class="partner-logo" src="{{kol_logo_url}}" alt="Partner Logo">
        </div>
        <div class="partner-name">{{kol_name}}</div>
    {{else}}
        <!-- Layout WITHOUT Logo --><div class="partner-name-no-logo">{{kol_name}}</div>
    {{/if}}

    <!-- 4. Dynamic Slogan --><div class="slogan">{{slogan_text}}</div>

</body>
</html>
